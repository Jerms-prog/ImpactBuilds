<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Login — Impact Builds</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Montserrat:wght@700;800;900&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="admin.css"/>
</head>
<body>

<div class="login-page">
  <!-- City SVG background -->
  <svg class="city-bg" viewBox="0 0 1440 700" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMax slice">
    <defs>
      <pattern id="win-lg" x="0" y="0" width="50" height="38" patternUnits="userSpaceOnUse">
        <rect x="6" y="6" width="30" height="22" fill="#9aaed4" opacity="0.55"/>
      </pattern>
      <pattern id="win-sm" x="0" y="0" width="32" height="28" patternUnits="userSpaceOnUse">
        <rect x="5" y="5" width="18" height="14" fill="#9aaed4" opacity="0.55"/>
      </pattern>
    </defs>
    <polygon points="0,60 185,60 225,28 40,28" fill="#7b8cc0"/>
    <rect x="0" y="60" width="185" height="700" fill="#7b8cc0"/>
    <polygon points="185,60 225,28 225,760 185,760" fill="#6a7ab0"/>
    <rect x="5" y="66" width="175" height="694" fill="url(#win-lg)" opacity="0.8"/>
    <rect x="190" y="190" width="70" height="510" fill="#7b8cc0"/>
    <rect x="193" y="195" width="64" height="505" fill="url(#win-sm)" opacity="0.7"/>
    <rect x="1255" y="0" width="185" height="700" fill="#7b8cc0"/>
    <rect x="1258" y="5" width="179" height="695" fill="url(#win-lg)" opacity="0.8"/>
    <rect x="1380" y="120" width="80" height="580" fill="#6a7ab0"/>
    <rect x="1160" y="180" width="88" height="520" fill="#7b8cc0"/>
    <rect x="1163" y="183" width="82" height="517" fill="url(#win-sm)" opacity="0.7"/>
    <rect x="470" y="250" width="16" height="450" fill="#6a7ab0"/>
    <rect x="452" y="278" width="52" height="10" fill="#6a7ab0"/>
    <rect x="954" y="250" width="16" height="450" fill="#6a7ab0"/>
    <rect x="936" y="278" width="52" height="10" fill="#6a7ab0"/>
    <!-- Cubic backstays reach tower centers (x=478, x=962) at tower top y=250; Q(720,330) center sag -->
    <path d="M -80 575 C 40 575 300 250 478 250 Q 720 330 962 250 C 1100 250 1360 575 1520 575" stroke="#6a7ab0" stroke-width="4" fill="none" stroke-linecap="round"/>
    <!-- Suspenders: y1 from y=250+160·t·(1−t) where t=(x−478)/484 -->
    <line x1="530" y1="265" x2="530" y2="570" stroke="#6a7ab0" stroke-width="1.5" opacity="0.8"/>
    <line x1="580" y1="277" x2="580" y2="570" stroke="#6a7ab0" stroke-width="1.5" opacity="0.8"/>
    <line x1="630" y1="284" x2="630" y2="570" stroke="#6a7ab0" stroke-width="1.5" opacity="0.8"/>
    <line x1="680" y1="289" x2="680" y2="570" stroke="#6a7ab0" stroke-width="1.5" opacity="0.8"/>
    <line x1="720" y1="290" x2="720" y2="570" stroke="#6a7ab0" stroke-width="1.5" opacity="0.8"/>
    <line x1="760" y1="289" x2="760" y2="570" stroke="#6a7ab0" stroke-width="1.5" opacity="0.8"/>
    <line x1="810" y1="284" x2="810" y2="570" stroke="#6a7ab0" stroke-width="1.5" opacity="0.8"/>
    <line x1="860" y1="277" x2="860" y2="570" stroke="#6a7ab0" stroke-width="1.5" opacity="0.8"/>
    <line x1="910" y1="265" x2="910" y2="570" stroke="#6a7ab0" stroke-width="1.5" opacity="0.8"/>
    <rect x="80" y="570" width="1280" height="14" fill="#6a7ab0"/>
    <rect x="80" y="584" width="1280" height="7" fill="#5d6da6"/>
  </svg>

  <div class="login-box">
    <div class="login-logo">
      <div class="login-logo__icons" aria-hidden="true">
        <svg width="36" height="48" viewBox="0 0 28 36" fill="none" xmlns="http://www.w3.org/2000/svg">
          <polygon points="0,7 8,2 28,2 20,7" fill="rgba(215,225,252,0.85)"/>
          <polygon points="0,7 20,7 20,35 0,35" fill="rgba(255,255,255,0.96)"/>
          <polygon points="20,7 28,2 28,30 20,35" fill="rgba(185,202,242,0.78)"/>
          <rect x="0" y="10" width="20" height="2" fill="rgba(135,160,215,0.55)"/>
          <rect x="0" y="14" width="20" height="2" fill="rgba(135,160,215,0.55)"/>
          <rect x="0" y="18" width="20" height="2" fill="rgba(135,160,215,0.55)"/>
          <rect x="0" y="22" width="20" height="2" fill="rgba(135,160,215,0.55)"/>
          <rect x="0" y="26" width="20" height="2" fill="rgba(135,160,215,0.55)"/>
          <rect x="0" y="30" width="20" height="2" fill="rgba(135,160,215,0.55)"/>
          <rect x="0" y="33" width="20" height="2" fill="rgba(135,160,215,0.55)"/>
        </svg>
        <svg width="32" height="28" viewBox="0 0 100 88" fill="none" xmlns="http://www.w3.org/2000/svg">
          <polygon points="50,5 95,83 5,83" fill="#fff" stroke="#d04040" stroke-width="11" stroke-linejoin="round"/>
          <rect x="43" y="25" width="14" height="30" rx="7" fill="#1a1a1a"/>
          <circle cx="50" cy="70" r="7" fill="#1a1a1a"/>
        </svg>
      </div>
      <h1>Impact<span>Builds</span></h1>
      <p>Admin Panel &mdash; Secure Login</p>
    </div>

    <div class="login-alert" id="loginAlert" role="alert"></div>

    <form id="loginForm" novalidate>
      <div class="form-group">
        <label class="form-label" for="username">Email <span class="req">*</span></label>
        <input class="form-control" type="email" id="username" name="email" placeholder="Email address" autocomplete="email" required/>
      </div>
      <div class="form-group">
        <label class="form-label" for="password">Password <span class="req">*</span></label>
        <input class="form-control" type="password" id="password" name="password" placeholder="••••••••••" autocomplete="current-password" required/>
      </div>
      <button class="btn btn--primary btn--full btn--lg" type="submit" id="loginBtn">Log In</button>
    </form>

    <a href="../index.html" class="login-back">&larr; Back to website</a>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../supabase-config.js"></script>
<script src="admin.js"></script>
<script>
(async () => {
  /* If already logged in, go straight to dashboard */
  const loggedIn = await AUTH.guard(false);
  if (loggedIn) {
    window.location.href = 'dashboard.html';
    return;
  }

  const form      = document.getElementById('loginForm');
  const alertBox  = document.getElementById('loginAlert');
  const btn       = document.getElementById('loginBtn');

  function showAlert(msg, type = 'error') {
    alertBox.className = `login-alert show ${type}`;
    alertBox.textContent = msg;
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;

    if (!username || !password) { showAlert('Please enter both username and password.'); return; }

    btn.disabled = true;
    btn.textContent = 'Logging in…';

    const result = await AUTH.login(username, password);
    if (result.ok) {
      showAlert('Login successful! Redirecting…', 'success');
      setTimeout(() => { window.location.href = 'dashboard.html'; }, 800);
    } else {
      showAlert(result.message);
      btn.disabled = false;
      btn.textContent = 'Log In';
    }
  });
})();
</script>
</body>
</html>
