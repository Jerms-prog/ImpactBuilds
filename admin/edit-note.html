    <a href="media.html" class="sidebar-link">

      Media

  <main class="admin-main">
    <h1 class="admin-page-title" id="pageTitle">Add New Note</h1>
    <p class="admin-page-sub">Published notes appear on the public website's Dev Notes section.</p>

    <div style="display:grid;grid-template-columns:1fr 340px;gap:1.5rem;align-items:start;">

      <!-- Main form -->
      <div>
        <div class="card" style="margin-bottom:1.25rem;">
          <div class="card-body">
            <div class="form-group">
              <label class="form-label" for="noteTitle">Title <span class="req">*</span></label>
              <input class="form-control" type="text" id="noteTitle" placeholder="Enter note title…"/>
              <span class="form-error" id="titleError"></span>
            </div>
            <div class="form-group" style="margin-bottom:0;">
              <label class="form-label" for="noteContent">Content <span class="req">*</span></label>
              <textarea class="form-control" id="noteContent" rows="12" placeholder="Write your note content here…"></textarea>
              <span class="form-error" id="contentError"></span>
            </div>
          </div>
        </div>

        <!-- Featured Image -->
        <div class="card">
          <div class="card-header"><h3>Featured Image</h3></div>
          <div class="card-body">
            <label class="upload-zone" id="uploadZone" style="margin-bottom:0;" for="imageInput">
              <input type="file" id="imageInput" accept="image/*"/>
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
              <p><strong>Click to upload</strong> or drag &amp; drop</p>
              <p style="font-size:0.75rem;">PNG, JPG, WEBP — max 2MB</p>
            </label>
            <div id="imagePreview" style="display:none;margin-top:1rem;position:relative;">
              <img id="previewImg" style="width:100%;max-height:220px;object-fit:cover;border-radius:var(--radius-sm);"/>
              <button id="removeImage" class="btn btn--danger btn--sm" style="position:absolute;top:0.5rem;right:0.5rem;">Remove</button>
            </div>
          </div>
        </div>
      </div>

      <!-- Sidebar settings -->
      <div style="display:flex;flex-direction:column;gap:1.25rem;">

        <!-- Publish -->
        <div class="card">
          <div class="card-header"><h3>Publish</h3></div>
          <div class="card-body" style="display:flex;flex-direction:column;gap:0.75rem;">
            <div class="toggle-wrap">
              <label class="toggle">
                <input type="checkbox" id="notePublished" checked/>
                <span class="toggle-slider"></span>
              </label>
              <span class="toggle-label" id="publishLabel">Published</span>
            </div>
            <div style="display:flex;gap:0.5rem;margin-top:0.25rem;">
              <button class="btn btn--primary btn--full" id="saveBtn">Save Note</button>
            </div>
            <a href="notes.html" class="btn btn--ghost btn--full">Cancel</a>
          </div>
        </div>

        <!-- Category -->
        <div class="card">
          <div class="card-header"><h3>Category</h3></div>
          <div class="card-body">
            <div class="form-group" style="margin-bottom:0;">
              <select class="form-control" id="noteCategory">
                <option value="General">General</option>
                <option value="Features">Features</option>
                <option value="Updates">Updates</option>
                <option value="Guide">Guide</option>
              </select>
            </div>
          </div>
        </div>

        <!-- Date -->
        <div class="card">
          <div class="card-header"><h3>Date</h3></div>
          <div class="card-body">
            <div class="form-group" style="margin-bottom:0;">
              <input class="form-control" type="date" id="noteDate"/>
            </div>
          </div>
        </div>

      </div>
    </div>
  </main>
</div>

<div class="toast-container" id="toastContainer"></div><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../supabase-config.js"></script>
<script src="admin.js"></script>
<script>
(async () => {
  if (!await AUTH.guard()) return;

  const params  = new URLSearchParams(location.search);
  const editId  = params.get('id');
  let imageData = null;

  /* Set default date */
  document.getElementById('noteDate').value = new Date().toISOString().slice(0,10);

  /* Load existing note for editing */
  if (editId) {
    document.getElementById('pageTitle').textContent = 'Edit Note';
    const note = await CMS.getNote(editId);
    if (!note) { alert('Note not found.'); history.back(); return; }
    document.getElementById('noteTitle').value    = note.title;
    document.getElementById('noteContent').value  = note.content;
    document.getElementById('noteCategory').value = note.category;
    document.getElementById('noteDate').value     = note.date;
    document.getElementById('notePublished').checked = note.status === 'Published';
    document.getElementById('publishLabel').textContent = note.status;
    if (note.featuredImage) {
      imageData = note.featuredImage;
      document.getElementById('imagePreview').style.display = 'block';
      document.getElementById('previewImg').src = note.featuredImage;
    }
  }

  /* Toggle label */
  document.getElementById('notePublished').addEventListener('change', function() {
    document.getElementById('publishLabel').textContent = this.checked ? 'Published' : 'Draft';
  });

  /* Image upload */
  const imageInput = document.getElementById('imageInput');
  const uploadZone = document.getElementById('uploadZone');

  imageInput.addEventListener('change', () => handleFile(imageInput.files[0]));

  uploadZone.addEventListener('dragover', (e) => { e.preventDefault(); uploadZone.classList.add('drag-over'); });
  uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('drag-over'));
  uploadZone.addEventListener('drop', (e) => {
    e.preventDefault();
    uploadZone.classList.remove('drag-over');
    const file = e.dataTransfer.files[0];
    if (file && file.type.startsWith('image/')) handleFile(file);
  });

  function handleFile(file) {
    if (!file) return;
    if (file.size > 2 * 1024 * 1024) { alert('Image must be under 2MB.'); return; }
    const reader = new FileReader();
    reader.onload = (e) => {
      imageData = e.target.result;
      document.getElementById('previewImg').src = imageData;
      document.getElementById('imagePreview').style.display = 'block';
    };
    reader.readAsDataURL(file);
  }

  document.getElementById('removeImage').addEventListener('click', () => {
    imageData = null;
    document.getElementById('imagePreview').style.display = 'none';
    imageInput.value = '';
  });

  /* Save */
  document.getElementById('saveBtn').addEventListener('click', async () => {
    const title   = document.getElementById('noteTitle').value.trim();
    const content = document.getElementById('noteContent').value.trim();
    let valid = true;

    if (!title)   { document.getElementById('titleError').textContent = 'Title is required.'; document.getElementById('noteTitle').classList.add('is-invalid'); valid = false; }
    else          { document.getElementById('titleError').textContent = ''; document.getElementById('noteTitle').classList.remove('is-invalid'); }
    if (!content) { document.getElementById('contentError').textContent = 'Content is required.'; document.getElementById('noteContent').classList.add('is-invalid'); valid = false; }
    else          { document.getElementById('contentError').textContent = ''; document.getElementById('noteContent').classList.remove('is-invalid'); }

    if (!valid) return;

    const saveBtn = document.getElementById('saveBtn');
    saveBtn.disabled = true;
    saveBtn.textContent = 'Saving…';

    const note = {
      id:            editId || uid(),
      title,
      content,
      category:      document.getElementById('noteCategory').value,
      date:          document.getElementById('noteDate').value || new Date().toISOString().slice(0,10),
      status:        document.getElementById('notePublished').checked ? 'Published' : 'Draft',
      featuredImage: imageData
    };
    const result = await CMS.saveNote(note);
    if (!result.ok) {
      const t = document.createElement('div');
      t.className = 'toast toast--error show';
      t.textContent = 'Save failed: ' + (result.message || 'Not authenticated — log out and log in again.');
      document.getElementById('toastContainer').appendChild(t);
      saveBtn.disabled = false;
      saveBtn.textContent = 'Save Note';
      return;
    }
    const t = document.createElement('div');
    t.className = 'toast toast--success show';
    t.textContent = editId ? 'Note updated!' : 'Note created!';
    document.getElementById('toastContainer').appendChild(t);
    setTimeout(() => { window.location.href = 'notes.html'; }, 1000);
  });
})();
</script>
</body>
</html>
