<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard — Impact Builds Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Montserrat:wght@700;800;900&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="admin.css"/>
</head>
<body>

<!-- Topbar -->
<header class="admin-topbar">
  <div class="admin-topbar__logo">
    <svg width="15" height="20" viewBox="0 0 28 36" fill="none" xmlns="http://www.w3.org/2000/svg">
      <polygon points="0,7 8,2 28,2 20,7" fill="rgba(215,225,252,0.85)"/>
      <polygon points="0,7 20,7 20,35 0,35" fill="rgba(255,255,255,0.96)"/>
      <polygon points="20,7 28,2 28,30 20,35" fill="rgba(185,202,242,0.78)"/>
      <rect x="0" y="10" width="20" height="2" fill="rgba(135,160,215,0.55)"/>
      <rect x="0" y="14" width="20" height="2" fill="rgba(135,160,215,0.55)"/>
      <rect x="0" y="18" width="20" height="2" fill="rgba(135,160,215,0.55)"/>
      <rect x="0" y="22" width="20" height="2" fill="rgba(135,160,215,0.55)"/>
      <rect x="0" y="26" width="20" height="2" fill="rgba(135,160,215,0.55)"/>
      <rect x="0" y="30" width="20" height="2" fill="rgba(135,160,215,0.55)"/>
      <rect x="0" y="33" width="20" height="2" fill="rgba(135,160,215,0.55)"/>
    </svg>
    Impact<span>Builds</span>
    <svg width="13" height="12" viewBox="0 0 32 28" fill="none" xmlns="http://www.w3.org/2000/svg">
      <polygon points="16,2 30,26 2,26" fill="#fff" stroke="#d04040" stroke-width="5" stroke-linejoin="round"/>
      <rect x="13.5" y="9" width="5" height="9" rx="2.5" fill="#1a1a1a"/>
      <circle cx="16" cy="22.5" r="2.5" fill="#1a1a1a"/>
    </svg>
  </div>
  <span class="badge-role">Admin</span>
  <div class="admin-topbar__spacer"></div>
  <div class="admin-topbar__actions">
    <a href="../index.html" class="btn btn--ghost btn--sm" target="_blank">View Site</a>
    <button class="btn btn--danger btn--sm" data-logout>Log Out</button>
  </div>
</header>

<div class="admin-layout">
  <!-- Sidebar -->
  <nav class="admin-sidebar">
    <span class="sidebar-section-label">Main</span>
    <a href="dashboard.html" class="sidebar-link active">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
      Dashboard
    </a>
    <a href="notes.html" class="sidebar-link">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
      Notes
    </a>
    <a href="media.html" class="sidebar-link">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
      Media
    </a>
    <a href="messages.html" class="sidebar-link" data-msg-badge>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      Messages
    </a>
    <a href="users.html" class="sidebar-link">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      Users
    </a>
    <a href="content.html" class="sidebar-link">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="4" rx="1"/><rect x="3" y="10" width="18" height="4" rx="1"/><rect x="3" y="16" width="18" height="4" rx="1"/></svg>
      Site Content
    </a>
    <a href="settings.html" class="sidebar-link">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      Settings
    </a>
  </nav>

  <!-- Main -->
  <main class="admin-main">
    <h1 class="admin-page-title" id="welcomeMsg">Welcome back, Admin</h1>
    <p class="admin-page-sub">Here's what's happening with Impact Builds today.</p>

    <!-- Stats -->
    <div class="stats-grid" id="statsGrid"></div>

    <!-- Quick Actions -->
    <h3 style="font-family:var(--font-h);font-size:0.9rem;font-weight:700;color:rgba(255,255,255,0.8);margin-bottom:0.75rem;letter-spacing:0.06em;text-transform:uppercase;">Quick Actions</h3>
    <div class="quick-actions">
      <a href="notes.html" class="qa-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        Manage Notes
      </a>
      <a href="edit-note.html" class="qa-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Add Note
      </a>
      <a href="media.html" class="qa-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
        Manage Media
      </a>
      <button class="qa-btn" id="qaChangePass">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        Change Password
      </button>
    </div>

    <!-- Recent Notes -->
    <div class="card" style="margin-top:1.75rem;">
      <div class="card-header">
        <h3>Recent Notes</h3>
        <a href="notes.html" class="btn btn--ghost btn--sm">View All</a>
      </div>
      <div class="table-wrap">
        <table id="recentTable">
          <thead><tr><th>Title</th><th>Category</th><th>Date</th><th>Status</th><th>Actions</th></tr></thead>
          <tbody id="recentBody"></tbody>
        </table>
      </div>
    </div>
  </main>
</div>

<!-- Change Password Modal -->
<div class="modal-overlay" id="passModal">
  <div class="modal">
    <h2 class="modal-title">Change Password</h2>
    <div class="login-alert" id="passAlert" style="margin-bottom:0.75rem;"></div>
    <div class="form-group">
      <label class="form-label">Current Password <span class="req">*</span></label>
      <input class="form-control" type="password" id="oldPass" placeholder="Current password"/>
    </div>
    <div class="form-group">
      <label class="form-label">New Password <span class="req">*</span></label>
      <input class="form-control" type="password" id="newPass" placeholder="At least 8 characters"/>
    </div>
    <div class="form-group">
      <label class="form-label">Confirm New Password <span class="req">*</span></label>
      <input class="form-control" type="password" id="confirmPass" placeholder="Repeat new password"/>
    </div>
    <div class="modal-actions">
      <button class="btn btn--ghost" id="passCancelBtn">Cancel</button>
      <button class="btn btn--primary" id="passSaveBtn">Save Password</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast-container" id="toastContainer"></div><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../supabase-config.js"></script>
<script src="admin.js"></script>
<script>
(async () => {
  if (!await AUTH.guard()) return;
  await CMS.seedIfEmpty();

  const user = AUTH.getUser();
  document.getElementById('welcomeMsg').textContent = `Welcome back, ${sanitize(user ? user.email : 'Admin')}!`;

  function showToast(msg, type = 'info') {
    const t = document.createElement('div');
    t.className = `toast toast--${type}`;
    t.textContent = msg;
    document.getElementById('toastContainer').appendChild(t);
    requestAnimationFrame(() => t.classList.add('show'));
    setTimeout(() => { t.classList.remove('show'); setTimeout(() => t.remove(), 300); }, 3000);
  }

  /* Stats */
  const stats = await CMS.getStats();
  document.getElementById('statsGrid').innerHTML = `
    <div class="stat-card"><div class="stat-card__icon stat-card__icon--blue"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg></div><div><div class="stat-card__value">${stats.totalNotes}</div><div class="stat-card__label">Total Notes</div></div></div>
    <div class="stat-card"><div class="stat-card__icon stat-card__icon--green"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg></div><div><div class="stat-card__value">${stats.publishedNotes}</div><div class="stat-card__label">Published Notes</div></div></div>
    <div class="stat-card"><div class="stat-card__icon stat-card__icon--orange"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg></div><div><div class="stat-card__value">${stats.draftNotes}</div><div class="stat-card__label">Drafts</div></div></div>
    <div class="stat-card"><div class="stat-card__icon stat-card__icon--teal"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg></div><div><div class="stat-card__value">${stats.totalMedia}</div><div class="stat-card__label">Media Files</div></div></div>
  `;

  /* Recent notes */
  const notes = (await CMS.getNotes()).slice(0, 5);
  const tbody = document.getElementById('recentBody');
  if (notes.length === 0) {
    tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;color:var(--text-muted);padding:2rem;">No notes yet. <a href="edit-note.html" style="color:var(--teal);">Add the first one</a>.</td></tr>';
  } else {
    tbody.innerHTML = notes.map(n => `
      <tr>
        <td class="td-title">${sanitize(n.title)}</td>
        <td><span class="category-badge">${sanitize(n.category)}</span></td>
        <td>${fmtDate(n.date)}</td>
        <td><span class="status-badge status-badge--${n.status.toLowerCase()}">${sanitize(n.status)}</span></td>
        <td class="td-actions">
          <a href="edit-note.html?id=${n.id}" class="btn btn--ghost btn--sm btn--icon" title="Edit"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></a>
        </td>
      </tr>`).join('');
  }

  /* Change password modal */
  const passModal = document.getElementById('passModal');
  const passAlert = document.getElementById('passAlert');
  const openPass  = () => { passAlert.className='login-alert'; passAlert.textContent=''; ['oldPass','newPass','confirmPass'].forEach(id=>{document.getElementById(id).value=''}); passModal.classList.add('open'); };
  const closePass = () => passModal.classList.remove('open');
  document.getElementById('qaChangePass').addEventListener('click', openPass);
  document.getElementById('passCancelBtn').addEventListener('click', closePass);
  passModal.addEventListener('click', (e) => { if (e.target === passModal) closePass(); });

  document.getElementById('passSaveBtn').addEventListener('click', async () => {
    const o = document.getElementById('oldPass').value;
    const n = document.getElementById('newPass').value;
    const c = document.getElementById('confirmPass').value;
    if (n !== c) { passAlert.className='login-alert show error'; passAlert.textContent='New passwords do not match.'; return; }
    const r = await AUTH.changePassword(o, n);
    if (r.ok) { closePass(); showToast('Password changed successfully!', 'success'); }
    else { passAlert.className='login-alert show error'; passAlert.textContent=r.message; }
  });
})();
</script>
</body>
</html>
